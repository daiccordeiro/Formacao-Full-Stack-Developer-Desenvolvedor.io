<div class="container main-container">

  @if (fornecedor){
    <div class="card shadow-sm mb-4">
      <div class="card-header bg-danger text-white">
        <h4 class="mb-0">
          Confirmar Exclusão
        </h4>
      </div>

      <div class="card-body">
        <p class="text-danger fw-semibold">
          Tem certeza que deseja excluir o fornecedor <strong>{{ fornecedor.nome }}</strong>?
        </p>
        <hr>

        <dl class="row mb-0">
          <dt class="col-sm-3 fw-semibold">Nome</dt>
          <dd class="col-sm-9">{{ fornecedor.nome }}</dd>

          <dt class="col-sm-3 fw-semibold">Documento</dt>
          <dd class="col-sm-9">{{ fornecedor.documento }}</dd>

          <dt class="col-sm-3 fw-semibold">Ativo</dt>
          <dd class="col-sm-9">

            @if (fornecedor.ativo) {
              <span class="badge bg-success">Ativo</span>
            } @else {
              <span class="badge bg-secondary">Inativo</span>
            }
          </dd>
        </dl>
      </div>
    </div>

    <div class="d-flex gap-2">
      <button class="btn btn-danger" (click)="excluirEvento()">
        <i class="fas fa-trash me-1"></i>
          Excluir
      </button>

      <a class="btn btn-outline-secondary"
        [routerLink]="['/fornecedores/listar-todos']">
        <i class="fas fa-arrow-left me-1"></i>
          Voltar
      </a>
    </div>

  } @else {

    <div class="alert alert-secondary">
      Carregando fornecedor...
    </div>
  }
</div>
